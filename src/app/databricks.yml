bundle:
  name: "db-residential-copilot"

sync:
  include:
    - .build

artifacts:
  default:
    build: apx build

resources:
  database_instances:
    db-residential-copilot-db:
      name: "db-residential-copilot"
      capacity: "CU_1"
  apps:
    db-residential-copilot-app:
      name: "db-residential-copilot"
      description: "db-residential-copilot created with apx"
      source_code_path: ./.build
      resources:
        - name: "db"
          database:
            database_name: "databricks_postgres"
            instance_name: ${resources.database_instances.db-residential-copilot-db.name}
            permission: "CAN_CONNECT_AND_CREATE"

targets:
  dev:
    mode: development
    default: true
