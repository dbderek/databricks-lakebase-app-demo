resources:
  database_instances:
    db_residential_copilot_db:
      name: "db-residential-copilot"
      capacity: "CU_1"

  apps:
    db_residential_copilot_app:
      name: "db-residential-copilot-${bundle.target}"
      description: "Databricks Residential Investment Copilot"
      source_code_path: ../src/app/.build
      resources:
        - name: "db"
          database:
            database_name: "databricks_postgres"
            instance_name: ${resources.database_instances.db_residential_copilot_db.name}
            permission: "CAN_CONNECT_AND_CREATE"
