resources:
  pipelines:
    db_residential_sdp:
      name: "[${bundle.target}] DB Residential SDP Pipeline"
      catalog: ${var.catalog}
      target: ${var.bronze_schema}
      serverless: true
      libraries:
        - file:
            path: ../src/pipelines/db_residential_sdp/transformations/bronze_properties.sql
        - file:
            path: ../src/pipelines/db_residential_sdp/transformations/bronze_rents.sql
        - file:
            path: ../src/pipelines/db_residential_sdp/transformations/silver_properties.sql
        - file:
            path: ../src/pipelines/db_residential_sdp/transformations/silver_rents.sql
        - file:
            path: ../src/pipelines/db_residential_sdp/transformations/gold_portfolio_property_metrics.sql
        - file:
            path: ../src/pipelines/db_residential_sdp/transformations/gold_portfolio_time_series.sql
      development: true
      photon: true
      channel: current
      continuous: false
      permissions:
        - level: CAN_VIEW
          group_name: "users"
