resources:
  jobs:
    generate_sample_data:
      name: "[${bundle.target}] Generate Sample Data"
      tasks:
        - task_key: generate_data
          notebook_task:
            notebook_path: ../src/notebooks/01_generate_sample_data.ipynb
          environment_key: default
      environments:
        - environment_key: default
          spec:
            client: "1"
            dependencies:
              - faker
      permissions:
        - level: CAN_VIEW
          group_name: "users"
