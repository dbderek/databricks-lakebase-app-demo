bundle:
  name: db-residential-investment-copilot

include:
  - resources/*.yml

sync:
  include:
    - src/app/.build

artifacts:
  app:
    build: apx build
    path: src/app

variables:
  catalog:
    default: "db_residential_demo"
  raw_schema:
    default: "raw"
  bronze_schema:
    default: "bronze"
  silver_schema:
    default: "silver"
  gold_schema:
    default: "gold"
  warehouse_id:
    lookup:
      warehouse: "Starter Warehouse"

targets:
  dev:
    default: true
    mode: development
    workspace:
      profile: vm
    variables:
      catalog: "db_residential_demo"

  prod:
    mode: production
    workspace:
      profile: vm
    variables:
      catalog: "db_residential_demo"
